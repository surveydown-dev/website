toc: false
eval: false
page-layout: full
css: ../css/templates.css
include-in-header:
  text: |
    <style>
    #title-block-header.quarto-title-block.default .quarto-title-meta {
      display: none;
    }
    </style>
include-after-body:
  text: |
    <script>
    // Append action controls to the page title: a GitHub icon tile and a
    // "Live Demo" button (window icon followed by the label). Inline Lucide
    // SVGs, wrapped in one span so both controls share size/alignment.
    document.addEventListener('DOMContentLoaded', function () {
      var data = document.getElementById('template-links');
      var h1 = document.querySelector('#title-block-header h1.title');
      if (!data || !h1) return;
      var SVG = {
        github: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>',
        demo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/></svg>'
      };
      var repo = data.getAttribute('data-repo');
      var demo = data.getAttribute('data-demo');
      if (!repo && !demo) return;
      var wrap = document.createElement('span');
      wrap.className = 'title-actions';
      function add(href, cls, label, html) {
        var a = document.createElement('a');
        a.href = href;
        a.className = cls;
        a.target = '_blank';
        a.rel = 'noopener';
        a.title = label;
        a.setAttribute('aria-label', label);
        a.innerHTML = html;
        wrap.appendChild(a);
      }
      if (repo) add(repo, 'title-icon', 'GitHub repository', SVG.github);
      if (demo) add(demo, 'title-pill', 'Live demo', '<span class="pill-icon">' + SVG.demo + '</span><span class="pill-text">Live Demo</span>');
      h1.appendChild(wrap);
    });
    </script>