toc: false
eval: false
page-layout: full
css: ../css/templates.css
include-in-header:
  text: |
    <style>
    #title-block-header.quarto-title-block.default .quarto-title-meta {
      display: none;
    }
    </style>
include-after-body:
  text: |
    <!-- Re-include the navbar lab logo: a directory-level include-after-body
         overrides (not merges with) the project-level one in _quarto.yml, so
         the logo script must be repeated here or it vanishes on template pages. -->
    <script src="/js/navbar-logo.js"></script>
    <script>
    // Append action controls to the page title: a GitHub icon tile and a
    // "Live Demo" button (window icon followed by the label). The icons are
    // drawn from images/icon-*.svg via CSS mask (see css/templates.css), so
    // no SVG markup is inlined here.
    document.addEventListener('DOMContentLoaded', function () {
      var data = document.getElementById('template-links');
      var h1 = document.querySelector('#title-block-header h1.title');
      if (!data || !h1) return;
      var repo = data.getAttribute('data-repo');
      var demo = data.getAttribute('data-demo');
      if (!repo && !demo) return;
      var wrap = document.createElement('span');
      wrap.className = 'title-actions';
      function add(href, cls, label, html) {
        var a = document.createElement('a');
        a.href = href;
        a.className = cls;
        a.target = '_blank';
        a.rel = 'noopener';
        a.title = label;
        a.setAttribute('aria-label', label);
        a.innerHTML = html;
        wrap.appendChild(a);
      }
      if (repo) add(repo, 'title-icon', 'GitHub repository', '');
      if (demo) add(demo, 'title-pill', 'Live demo', '<span class="pill-icon"></span><span class="pill-text">Live Demo</span>');
      h1.appendChild(wrap);
    });
    </script>